<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="sign.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <h1>
            Sign Up
        </h1>
        <p>Sign Up here if you do not have an account</p>
          <form id="form" >
            <div class="incorrect">
                <label for="firstname-input">
<img src="favicon/person.svg" alt="Name">
                </label>
                <input type="text" name="firstname" id="firstname-input" placeholder="Username" required autocapitalize="">
            </div>
            <div>
                <label for="email-input">
                    <img src="favicon/email.svg" alt="Email">
                </label>
                <input type="email" name="email" id="email-input" placeholder="Email" required>
            </div>
            <div>
                <label for="password-input">
                    <img src="favicon/password.svg" alt="Password">
                </label>
                <input type="password" name="password" id="password-input" placeholder="Password" required>
            </div>
            <div>
                <label for="repeat password-input">
                     <img src="favicon/password.svg" alt="Repeat Password">
                </label>
                <input type="password" name="password" id="repeat password-input" placeholder="Repeat Password">
            </div>
            <div>
                <button type="submit">Sign UP Here</button>
            </div>
          </form>
          <p>Already have an account? <a href="login.html">login</a></p>
    </div>


    <script type="text/javascript" src="sign.js" defer></script>
</body>
</html>
