<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In</title>
    <link rel="stylesheet" href="sign.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
    <div class="wrapper">
        <h1>
            Login
        </h1>
        <p>Login here if you already have an account</p>
          <form id="form" >
           
            <div>
                <label for="email-input">
                    <img src="favicon/email.svg" alt="Email">
                </label>
                <input type="email" name="email" id="email-input" placeholder="Email" required>
            </div>
            <div>
                <label for="password-input">
                    <img src="favicon/password.svg" alt="Password">
                </label>
                <input type="password" name="password" id="password-input" placeholder="Password" required>
            </div>
            
            <div>
                <button type="submit">Login</button>
            </div>
          </form>
          <p>Create an account <a href="sign.html">Sign Up</a></p>
    </div>


    <script type="text/javascript" src="sign.js" defer></script>
</body>
</html>
